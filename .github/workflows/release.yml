name: Release & Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_package: amae-linux-x64
            binary: amae

          - target: x86_64-apple-darwin
            os: macos-latest
            npm_package: amae-darwin-x64
            binary: amae

          - target: aarch64-apple-darwin
            os: macos-latest
            npm_package: amae-darwin-arm64
            binary: amae

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_package: amae-win32-x64
            binary: amae.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to npm package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm_package }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} npm/${{ matrix.npm_package }}/bin/${{ matrix.binary }}
          chmod +x npm/${{ matrix.npm_package }}/bin/${{ matrix.binary }} || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_package }}
          path: npm/${{ matrix.npm_package }}/bin/${{ matrix.binary }}

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update versions in all package.json files
        run: |
          VERSION=${{ steps.version.outputs.version }}
          node -e "
            const fs = require('fs');
            const packages = [
              'npm/amae-cli',
              'npm/amae-darwin-arm64',
              'npm/amae-darwin-x64',
              'npm/amae-linux-x64',
              'npm/amae-win32-x64'
            ];
            packages.forEach(pkgDir => {
              const pkgPath = pkgDir + '/package.json';
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
              pkg.version = '${VERSION}';
              if (pkg.optionalDependencies) {
                Object.keys(pkg.optionalDependencies).forEach(dep => {
                  pkg.optionalDependencies[dep] = '${VERSION}';
                });
              }
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
              console.log('Updated', pkgPath, 'to', '${VERSION}');
            });
          "

      - name: Generate JS wrapper for main package
        run: node scripts/build-npm.js --skip-build

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Place binaries into npm package directories
        shell: bash
        run: |
          declare -A PKGS=(
            [amae-darwin-arm64]=amae
            [amae-darwin-x64]=amae
            [amae-linux-x64]=amae
            [amae-win32-x64]=amae.exe
          )
          for pkg in "${!PKGS[@]}"; do
            bin="${PKGS[$pkg]}"
            mkdir -p npm/$pkg/bin
            src="artifacts/$pkg/$bin"
            if [ -f "$src" ]; then
              cp "$src" "npm/$pkg/bin/$bin"
              chmod +x "npm/$pkg/bin/$bin"
              echo "Placed $bin into npm/$pkg/bin/"
            else
              echo "WARNING: artifact not found: $src"
            fi
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in amae-darwin-arm64 amae-darwin-x64 amae-linux-x64 amae-win32-x64; do
            echo "Publishing $pkg..."
            cd npm/$pkg
            npm publish --access public || echo "Already published, skipping"
            cd ../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/amae-cli
          npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
